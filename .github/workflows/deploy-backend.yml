name: Deploy backend to EC2 (via SSM)

# SSM replaces SSH: no long-lived key in GitHub secrets, no inbound port 22 needed.
# Auth flow: OIDC -> AssumeRoleWithWebIdentity -> ttu14-deploy-role (scoped to
# ssm:SendCommand on this one instance) -> SSM Agent runs the script as root on
# the EC2, which we re-drop to ec2-user so git/venv ownership stays clean.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-backend
  cancel-in-progress: false

permissions:
  id-token: write   # required for OIDC token
  contents: read

env:
  AWS_REGION: ap-southeast-2
  INSTANCE_ID: i-0d96fb2ccdf8514d6
  DEPLOY_ROLE_ARN: arn:aws:iam::699843492864:role/ttu14-deploy-role

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production   # trust policy pins sub=...:environment:production
    timeout-minutes: 10

    steps:
      - name: Assume deploy role via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Send deploy command via SSM
        id: send
        run: |
          set -euo pipefail
          # Remote script runs as root via SSM Agent; sudo -u ec2-user -H flips us
          # back to the ec2-user HOME so git/venv/ownership checks pass.
          REMOTE_SCRIPT=$(cat <<'REMOTE'
          set -euo pipefail
          sudo -u ec2-user -H bash <<'USER'
          set -euo pipefail
          cd /home/ec2-user/ttu14d3

          BEFORE_REQ=$(md5sum backend/requirements.txt | awk '{print $1}')
          git pull --ff-only origin main
          AFTER_REQ=$(md5sum backend/requirements.txt | awk '{print $1}')

          if [ "$BEFORE_REQ" != "$AFTER_REQ" ]; then
            echo "requirements.txt changed - installing dependencies"
            source backend/venv/bin/activate
            pip install --quiet -r backend/requirements.txt
            deactivate
          else
            echo "requirements.txt unchanged - skipping pip install"
          fi
          echo "HEAD=$(git rev-parse --short HEAD)"
          USER

          systemctl restart ttu14
          sleep 2
          if ! systemctl is-active --quiet ttu14; then
            echo "ttu14 service failed to come up - last 40 log lines:"
            journalctl -u ttu14 -n 40 --no-pager
            exit 1
          fi
          curl -sf --max-time 5 http://127.0.0.1:3001/api/players > /dev/null
          echo "Deploy OK."
          REMOTE
          )

          # Build --parameters as proper JSON (avoids CLI short-form escaping pitfalls).
          jq -n --arg s "$REMOTE_SCRIPT" '{commands: [$s]}' > /tmp/ssm-params.json

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "GitHub Actions deploy ${GITHUB_SHA::7}" \
            --parameters file:///tmp/ssm-params.json \
            --query 'Command.CommandId' --output text)
          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "Sent SSM command: $CMD_ID"

      - name: Wait for command, stream output
        env:
          CMD_ID: ${{ steps.send.outputs.command_id }}
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
            esac
            sleep 3
          done

          echo "::group::SSM command stdout"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text
          echo "::endgroup::"

          STDERR=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardErrorContent' --output text)
          if [ -n "$STDERR" ]; then
            echo "::group::SSM command stderr"
            echo "$STDERR"
            echo "::endgroup::"
          fi

          FINAL=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'Status' --output text)
          echo "Final status: $FINAL"
          [ "$FINAL" = "Success" ] || exit 1
