name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DB_HOST: ""
          JWT_SECRET: ci-test-secret-key-32-characters
        run: python -m pytest tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # Using `npm install` instead of `npm ci` to work around a known
        # npm bug (npm/cli#4828) where platform-specific optional deps
        # (e.g. @tailwindcss/oxide-linux-x64-gnu) are not installed by
        # `npm ci` when the lockfile was generated on a different platform.
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
